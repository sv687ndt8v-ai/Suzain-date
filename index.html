<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>For You 💖</title>
  <style>
    body{
      margin:0;
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background: linear-gradient(135deg, #ff9a9e, #fad0c4);
      font-family: Arial, sans-serif;
    }
    .card{
      text-align:center;
      background:white;
      padding:30px;
      border-radius:20px;
      box-shadow:0 10px 30px rgba(0,0,0,0.2);
    }
    h1{
      color:#ff4d6d;
    }
    p{
      color:#333;
      font-size:18px;
    }
    img{
      width:200px;
      border-radius:15px;
      margin-top:10px;
    }
    .btn{
      margin-top:15px;
      padding:10px 20px;
      border:none;
      background:#ff4d6d;
      color:white;
      border-radius:10px;
      cursor:pointer;
    }
  </style>
</head>
<body>

<div class="card">
  <h1>For Suzain 💖</h1>
  <p>Tum meri favourite story ho ✨</p>

  <!-- yahan apni image lagao -->
  <img src="suzain.jpg" alt="her photo">

  <br>
  <button class="btn" onclick="alert('I like you ❤️')">Click Me</button>
</div>

</body>
</html>
